<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/dashboard.css">

    <title>Dashboard</title>
</head>

<body onload="atualizarDashboard()">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo-sidebar">
            <img src="assets/img/logo/logo preta.png">
        </div>

        <div class="menu-sidebar">

            <a href="comunidade.html">Comunidade</a>
            <a href="questionario.html">Questionário</a>
            <a href="index.html">Sair</a>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div class="dashboard">

        <!-- TOPO -->

        <div class="topo-dashboard">

            <div>
                <h1>Dashboard Star Wars</h1>

                <p>Análise da comunidade galáctica</p>
            </div>

        </div>

        <!-- KPIs -->

        <div class="cards-dashboard">

            <div class="card-dashboard">
                <h3>Total de Usuários</h3>

                <span id="kpi_totalUsuarios">0</span>
            </div>

            <div class="card-dashboard">
                <h3>Facção Mais Popular</h3>

                <span id="kpi_faccao">-</span>
            </div>

            <div class="card-dashboard">
                <h3>Personagem Favorito</h3>

                <span id="kpi_personagem">-</span>
            </div>

            <div class="card-dashboard">
                <h3>Filme Mais Votado</h3>

                <span id="kpi_filme">-</span>
            </div>

        </div>

        <!-- GRÁFICOS -->

        <div class="graficos-dashboard">

            <div class="grafico-box">

                <h2>Facções Favoritas</h2>

                <canvas id="graficoFaccoes"></canvas>

            </div>

            <div class="grafico-box">

                <h2>Trilogias Favoritas</h2>

                <canvas id="graficoTrilogias"></canvas>

            </div>

        </div>

        <!-- TABELA -->

        <div class="atividade-recente">

            <h2>Últimos 3 acessos</h2>

            <table>

                <thead>

                    <tr>
                        <th>Usuário</th>
                        <th>Facção</th>
                        <th>Personagem</th>
                        <th>Filme</th>
                    </tr>

                </thead>

                <tbody id="tbody_ultimos">

                </tbody>

            </table>

        </div>

    </div>

</body>


<<script>

    var graficoFaccoes;
    var graficoTrilogias;

    function atualizarDashboard() {

        buscarTotalUsuarios();

        buscarFaccaoPopular();

        buscarPersonagemFavorito();

        buscarFilmeFavorito();

        buscarGraficoFaccoes();

        buscarGraficoTrilogias();

        buscarUltimosAcessos();

        setInterval(() => {

            buscarTotalUsuarios();

            buscarFaccaoPopular();

            buscarPersonagemFavorito();

            buscarFilmeFavorito();

            buscarUltimosAcessos();

        }, 5000);

    }

    /* =========================
        KPIs
    ========================= */

    function buscarTotalUsuarios() {

        fetch("/dashboard/totalUsuarios")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    kpi_totalUsuarios.innerHTML = dados[0].total;

                });

            });

    }

    function buscarFaccaoPopular() {

        fetch("/dashboard/faccaoPopular")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    kpi_faccao.innerHTML =
                        dados[0].faccao_favorita;

                });

            });

    }

    function buscarPersonagemFavorito() {

        fetch("/dashboard/personagemFavorito")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    kpi_personagem.innerHTML =
                        dados[0].nome;

                });

            });

    }

    function buscarFilmeFavorito() {

        fetch("/dashboard/filmeFavorito")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    kpi_filme.innerHTML =
                        dados[0].filme_favorito;

                });

            });

    }

    /* =========================
        GRÁFICO FACÇÕES
    ========================= */

    function buscarGraficoFaccoes() {

        fetch("/dashboard/graficoFaccoes")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    var labels = [];
                    var valores = [];

                    for (var i = 0; i < dados.length; i++) {

                        labels.push(
                            dados[i].faccao_favorita
                        );

                        valores.push(
                            dados[i].votos
                        );

                    }

                    if (graficoFaccoes) {

                        graficoFaccoes.destroy();

                    }

                    graficoFaccoes = new Chart(graficoFaccoesCanvas, {

                        type: 'bar',

                        data: {

                            labels: labels,

                            datasets: [{
                                label: 'Quantidade de votos',
                                data: valores
                            }]

                        },

                        options: {

                            responsive: true,

                            plugins: {

                                legend: {
                                    labels: {
                                        color: 'white'
                                    }
                                }

                            },

                            scales: {

                                y: {
                                    ticks: {
                                        color: 'white'
                                    }
                                },

                                x: {
                                    ticks: {
                                        color: 'white'
                                    }
                                }

                            }

                        }

                    });

                });

            });

    }

    /* =========================
        GRÁFICO TRILOGIAS
    ========================= */

    function buscarGraficoTrilogias() {

        fetch("/dashboard/graficoTrilogias")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    var labels = [];
                    var valores = [];

                    for (var i = 0; i < dados.length; i++) {

                        labels.push(
                            dados[i].trilogia_favorita
                        );

                        valores.push(
                            dados[i].votos
                        );

                    }

                    if (graficoTrilogias) {

                        graficoTrilogias.destroy();

                    }

                    graficoTrilogias = new Chart(graficoTrilogiasCanvas, {

                        type: 'pie',

                        data: {

                            labels: labels,

                            datasets: [{
                                label: 'Quantidade de votos',
                                data: valores
                            }]

                        },

                        options: {

                            responsive: true,

                            plugins: {

                                legend: {
                                    labels: {
                                        color: 'white'
                                    }
                                }

                            }

                        }

                    });

                });

            });

    }

    /* =========================
        TABELA
    ========================= */

    function buscarUltimosAcessos() {

        fetch("/dashboard/ultimosAcessos")
            .then(function (resposta) {

                resposta.json().then(function (dados) {

                    tbody_ultimos.innerHTML = "";

                    for (var i = 0; i < dados.length; i++) {

                        tbody_ultimos.innerHTML += `

                            <tr>

                                <td>${dados[i].usuario}</td>

                                <td>${dados[i].faccao_favorita}</td>

                                <td>${dados[i].personagem}</td>

                                <td>${dados[i].filme_favorito}</td>

                            </tr>

                        `;

                    }

                });

            });

    }

</script>


</body>
</html>
